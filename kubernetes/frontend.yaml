apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-server
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-server
  template:
    metadata:
      labels:
        app: frontend-server
      annotations:
        argocd-image-updater.argoproj.io/image-list-frontend-server: 693041643423.dkr.ecr.us-east-1.amazonaws/eks-curso
        argocd-image-updater.argoproj.io/frontend-server.update-strategy: latest
        argocd-image-updater.argoproj.io/write-back-method: git
        argocd-image-updater.argoproj.io/git-branch: main
    spec:
      containers:
        - name: frontend-server
          image: 693041643423.dkr.ecr.us-east-1.amazonaws.com/eks-curso:latest
          command: ["streamlit", "run", "dashboard.py", "--server.port", "80"]
          env:
            - name: API_URL
              value: https://aip3.lat
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-server
  namespace: default
spec:
  selector:
    app: frontend-server
  ports:
    - port: 80
      targetPort: 80