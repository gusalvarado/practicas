apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      containers:
        - name: api-server
          image: 693041643423.dkr.ecr.us-east-1.amazonaws.com/eks-curso:9507150f42f54d75746aeabf71a7b0a2c56968e9
          command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "80"]
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: api-server
  namespace: default
spec:
  selector:
    app: api-server
  ports:
    - port: 80
      targetPort: 80