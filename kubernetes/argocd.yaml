apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aip3-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/gusalvarado/practicas.git
    targetRevision: HEAD
    path: kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-server-proxy
  namespace: default
spec:
  type: ExternalName
  externalName: argocd-server-proxy.default.svc.cluster.local
  ports:
    - port: 80
      targetPort: 80
