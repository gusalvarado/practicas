AWSTemplateFormatVersion: "2010-09-09"
Description: "AIP3 EKS"

Parameters:
  VpcId:
    Type: String
    Default: vpc-0a5e30813d32f424b
  PrivateSubnet1:
    Type: String
    Default: subnet-064fc70e074595123
  PrivateSubnet2:
    Type: String
    Default: subnet-0018a8de4b1ffddb2
  PublicSubnet1:
    Type: String
    Default: subnet-06dd2d4412226476f
  PublicSubnet2:
    Type: String
    Default: subnet-029baeab7f06ea4ff

Resources:
  EKSCluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: !Sub ${AWS::StackName}-cluster
      ResourcesVpcConfig:
        SecurityGroupIds:
          - !Ref ClusterSecurityGroup
        SubnetIds:
          - !Ref PublicSubnet1
          - !Ref PublicSubnet2
      RoleArn: !GetAtt ClusterRole.Arn
      Version: 1.33
  ClusterRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Action:
              - sts:AssumeRole
            Effect: Allow
            Principal:
              Service: eks.amazonaws.com
        Version: 2012-10-17
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
        - arn:aws:iam::aws:policy/AmazonEKSVPCResourceController
        - arn:aws:iam::aws:policy/AWSLoadBalancerControllerIAMPolicy
  ApplicationNodeGroup:
    Type: AWS::EKS::Nodegroup
    Properties:
      ClusterName: !Ref EKSCluster
      NodeRole: !Ref ApplicationNodeRole
      Subnets:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      ScalingConfig:
        DesiredSize: 2
        MinSize: 2
        MaxSize: 4
      InstanceTypes:
        - t3.medium
      NodeRole: !GetAtt ApplicationNodeRole.Arn
      DiskSize: 20
  ApplicationNodeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Action:
            - sts:AssumeRole
            Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
        Version: 2012-10-17
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
  ClusterSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub ${AWS::StackName}-cluster-security-group
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTP/80-HTTPS/443 VPC
  ApplicationNodeSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub ${AWS::StackName}-application-node-security-group
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          DestinationSecurityGroupId: !Ref ClusterSecurityGroup